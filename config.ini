; GALBA2 configuration file

[paths]
samples_file = samples.csv
augustus_config_path = augustus_config

[containers]
; galba2-tools: miniprot, boundary_scorer, miniprothint, compleasm (~50 MB)
; TODO: build and push katharinahoff/galba2-tools:latest, then switch
galba_tools_image = docker://katharinahoff/galba2-tools:latest
; AUGUSTUS biocontainer: augustus, etraining, diamond, all Perl scripts (249 MB)
augustus_image = docker://quay.io/biocontainers/augustus:3.5.0--pl5321h9716f88_9

[SLURM_ARGS]
cpus_per_task = 8
mem_of_node = 16000
max_runtime = 60

[PARAMS]
skip_optimize_augustus = 1
skip_busco = 1
run_omark = 0
run_ncrna = 1
use_dev_shm = 0
no_cleanup = 0
disable_diamond_filter = 0
translation_table = 1

# FANTASIA-Lite functional annotation. OFF by default; GPU-only (A100 validated).
# Set enable = 1 and fill in the three paths to activate.
[fantasia]
enable = 0
sif = /home/nas-hs/data/db/EukBinDB/images/fantasia_lite.sif
hf_cache_dir = /home/nas-hs/projs/fantasia-tiberius/hf_cache
lookup_dir = /home/nas-hs/data/db/EukBinDB/fantasia_v1_lookup
partition = vision-fast
gpus = 1
mem_mb = 25000
cpus_per_task = 16
max_runtime = 120
min_score = 0.5
