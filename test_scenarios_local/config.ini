; Shared biology configuration for all local (no-SLURM) test scenarios.
;
; Every scenario in test_scenarios_local/ uses this single file via the
; GALBA2_CONFIG environment variable (set by run_test.sh). Per-scenario
; deviations from these defaults are expressed as GALBA2_* environment
; variable overrides in each scenario's scenario_overrides.sh.

[paths]
samples_file = samples.csv
augustus_config_path = augustus_config

[containers]
galba_image = docker://katharinahoff/galba-notebook:latest

[PARAMS]
skip_optimize_augustus = 1
run_omark = 0
skip_busco = 0
use_dev_shm = 0
disable_diamond_filter = 0
no_cleanup = 0
